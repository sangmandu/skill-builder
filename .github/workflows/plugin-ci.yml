name: Plugin CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test:scenarios
      - run: npm run sync:plugins
      - run: npm run validate:plugins
